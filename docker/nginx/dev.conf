# =============================================================================
# BOS API Gateway — Development
#
# Listens on :80 (no TLS in dev — SSL termination added in production via
# a separate nginx.prod.conf with Let's Encrypt / managed cert).
#
# Routing table:
#   /auth/**         →  auth-service      (host:3001)
#   /dev/**          →  auth-service      (host:3001)   [dev shortcuts only]
#   /**              →  crm-core          (host:3002)
#
# Single gateway health probe (does not touch any service):
#   GET /gateway/health  →  200 {"status":"ok"}
#
# Services run directly on the host machine (pnpm run start:*:dev).
# Docker containers reach the host via host.docker.internal.
# On Linux add extra_hosts: ["host.docker.internal:host-gateway"] in
# docker-compose (already done below).
# =============================================================================

upstream auth_service {
    server host.docker.internal:3001;
    keepalive 16;
}

upstream crm_core {
    server host.docker.internal:3002;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    # ── Request limits ──────────────────────────────────────────────────────
    client_max_body_size 10m;

    # ── Proxy defaults applied to every location ────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Disable connection keep-alive headers so upstream keepalive pool works.
    proxy_set_header   Connection        "";
    # Nginx $request_id is a 32-char hex string generated per request.
    # NestJS services read X-Request-ID and attach it to every log line.
    proxy_set_header   X-Request-ID      $request_id;

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ── Gateway liveness probe (does not proxy to any service) ──────────────
    location = /gateway/health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Auth Service (/auth/**, /dev/**) ────────────────────────────────────
    # auth-service controllers: @Controller('auth'), @Controller('dev')
    location /auth/ {
        proxy_pass http://auth_service;
    }

    location /dev/ {
        proxy_pass http://auth_service;
    }

    # ── CRM Core (all remaining routes) ─────────────────────────────────────
    # crm-core controllers: /staff, /branches, /roles, /contacts, /leads,
    # /tags, /custom-fields, /lead-assignment-config, /lead-webhooks,
    # /webhooks/leads/:token, /tenant, /health
    location / {
        proxy_pass http://crm_core;
    }
}
