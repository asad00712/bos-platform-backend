name: bos-dev

services:
  # ---------------------------------------------------------------------------
  # Nginx — API Gateway
  # Single entry point for all services on port 80 (dev).
  # Routes: /auth/** → auth-service:3001 | /** → crm-core:3002
  # Services run on the host machine (pnpm run start:*:dev).
  # extra_hosts ensures host.docker.internal resolves on Linux too.
  # ---------------------------------------------------------------------------
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: bos-nginx-gateway
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/gateway/health']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bos-net

  # ---------------------------------------------------------------------------
  # Redis 1 — Operational
  # Handles: JWT revocation, rate limiting, sessions, pub/sub, cache
  # Persistence: AOF (appendonly) — data must survive restarts
  # Eviction: noeviction — never silently drop keys
  # ---------------------------------------------------------------------------
  redis-operational:
    image: redis:7-alpine
    container_name: bos-redis-operational
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis-operational-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bos-net

  # ---------------------------------------------------------------------------
  # Redis 2 — Transactional Queue
  # Handles: auth emails, notifications, webhooks, AI lead scoring
  # Persistence: AOF — job payloads must survive restarts
  # Eviction: noeviction — never drop queued jobs
  # ---------------------------------------------------------------------------
  redis-queue-transactional:
    image: redis:7-alpine
    container_name: bos-redis-queue-transactional
    restart: unless-stopped
    ports:
      - '6380:6379'
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - redis-queue-transactional-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bos-net

  # ---------------------------------------------------------------------------
  # Redis 3 — Heavy Queue
  # Handles: campaigns, workflows, bulk imports
  # Persistence: RDB (save 60 1000) — periodic snapshot
  # Eviction: noeviction — BullMQ requires this; never silently drop queued jobs
  # ---------------------------------------------------------------------------
  redis-queue-heavy:
    image: redis:7-alpine
    container_name: bos-redis-queue-heavy
    restart: unless-stopped
    ports:
      - '6381:6379'
    command: >
      redis-server
      --save 60 1000
      --maxmemory 2gb
      --maxmemory-policy noeviction
    volumes:
      - redis-queue-heavy-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bos-net

  # ---------------------------------------------------------------------------
  # RedisInsight — GUI for all three Redis instances
  # ---------------------------------------------------------------------------
  redis-insight:
    image: redis/redisinsight:latest
    container_name: bos-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      redis-operational:
        condition: service_healthy
      redis-queue-transactional:
        condition: service_healthy
      redis-queue-heavy:
        condition: service_healthy
    volumes:
      - redis-insight-data:/data
    networks:
      - bos-net

volumes:
  redis-operational-data:
  redis-queue-transactional-data:
  redis-queue-heavy-data:
  redis-insight-data:

networks:
  bos-net:
    driver: bridge
